name: Reader Smoke Test

on:
  push:
    branches: ["main"]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm install --prefix cli
      - run: npm run build
      - run: echo "Smoke workflow is staged for the reader journey and will become end-to-end once the CLI commands are complete."
