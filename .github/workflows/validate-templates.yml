name: Validate Templates

on:
  push:
    branches: ["main"]
  pull_request:
    paths:
      - "templates/**"

jobs:
  validate-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm install --prefix cli
      - run: npm run build
      - run: echo "Phase 1 template validation scaffold: run the CLI validator against worked examples once the command exists."
