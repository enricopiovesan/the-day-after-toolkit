<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/docs-site.css' | relative_url }}">
  </head>
  <body>
    <div class="shell">
      <header class="site-header">
        <div>
          <p class="eyebrow">The Day After Toolkit</p>
          <h1><a href="{{ '/docs/' | relative_url }}">{{ site.title }}</a></h1>
          <p class="lede">Contract-first documentation for practitioners using <code>cdad</code> to make repositories legible for AI agents.</p>
        </div>
        <nav class="top-links" aria-label="Project links">
          <a href="{{ '/docs/' | relative_url }}">Docs Home</a>
          <a href="{{ '/docs/cli-reference/' | relative_url }}">CLI Reference</a>
          <a href="{{ '/docs/launch-readiness-checklist/' | relative_url }}">Launch Checklist</a>
        </nav>
      </header>

      <div class="content-shell">
        <aside class="sidebar" aria-label="Documentation navigation">
          <p class="sidebar-label">Documentation</p>
          <ul>
            {% for item in site.data.docs_nav %}
            <li>
              <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>{{ item.title }}</a>
            </li>
            {% endfor %}
          </ul>
        </aside>

        <main class="content">
          {{ content }}
        </main>
      </div>
    </div>
  </body>
</html>
